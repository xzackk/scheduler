name: Build & push image

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "nginx.conf"
      - "Dockerfile"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scheduler:latest
            ghcr.io/${{ github.repository_owner }}/scheduler:${{ github.sha }}
